version: "3.9"
services:
  postgres:
    image: postgres:16
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -p 5433" ]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: identity-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-identity-service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-270504}
    command: -p 5433
    ports:
      - "5433:5433"
    volumes:
      - identity_pg_data:/var/lib/postgresql/data
    networks:
      - identity-network

  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: identity-service-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5433}
      DB_NAME: ${DB_NAME:-identity-service}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-270504}
      JWT_SECRET: ${JWT_SECRET:-replace-with-at-least-32-characters-secret}
    ports:
      - "8081:8080"
    networks:
      - identity-network
      - tickethub-network
    volumes:
      - ./src/main/resources:/app/config  # Spring Boot tự đọc /app/config/
    restart: unless-stopped

volumes:
  identity_pg_data:

networks:
  identity-network:
    driver: bridge
  tickethub-network:
    external: true
