spring.application.name=IdentityService
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:identity-service}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:270504}
server.port=8081
#spring.docker.compose.enabled=false

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET:replace-with-at-least-32-characters-secret}
jwt.access-expiration-ms=3600000
jwt.refresh-expiration-ms=604800000
