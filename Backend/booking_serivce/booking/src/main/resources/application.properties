spring.application.name=booking-service

# Server Configuration
server.port=8083

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:booking-service}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:270504}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Disable Spring Cloud Config
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:

# Disable Eureka Service Discovery
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# Redis Configuration
spring.data.redis.host=redis-dev
spring.data.redis.port=6379
spring.data.redis.timeout=30000ms

# Kafka Configuration
spring.kafka.bootstrap-servers=kafka-dev:9092
spring.kafka.consumer.group-id=booking-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Connection Settings
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.connection.timeout.ms=30000
spring.kafka.consumer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=30000
spring.kafka.producer.properties.request.timeout.ms=30000

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanos=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Application Configuration
# app.kafka.group-id=booking-service-group
